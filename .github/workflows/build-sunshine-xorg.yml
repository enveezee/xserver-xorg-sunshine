name: Build Sunshine Xorg (Debian Stable)

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *
  workflow_dispatch:
    inputs:
      force:
        description: "Force rebuild even if Debian version hasn't changed"
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for updates
        id: updatecheck
        env:
          REPO: ${{ github.repository }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          chmod +x ./scripts/update-check.sh
          ./scripts/update-check.sh

      # STOP THE WORKFLOW IF SKIP=true
      - name: Stop if no build needed
        if: steps.updatecheck.outputs.skip == 'true'
        run: |
          echo "No update needed. Stopping workflow."

      # EVERYTHING BELOW ONLY RUNS IF skip=false
      - name: Install debootstrap
        if: steps.updatecheck.outputs.skip == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap

      - name: Create Debian stable chroot
        if: steps.updatecheck.outputs.skip == 'false'
        run: |
          sudo debootstrap --variant=buildd stable /srv/chroot/ http://deb.debian.org/debian

      - name: Configure chroot apt sources
        if: steps.updatecheck.outputs.skip == 'false'
        run: |
          sudo tee /srv/chroot/etc/apt/sources.list > /dev/null << 'EOF'
          deb http://deb.debian.org/debian stable main
          deb http://security.debian.org/debian-security stable-security main
          deb http://deb.debian.org/debian stable-updates main
          deb-src http://deb.debian.org/debian stable main
          deb-src http://security.debian.org/debian-security stable-security main
          deb-src http://deb.debian.org/debian stable-updates main
          EOF

      - name: Update chroot
        if: steps.updatecheck.outputs.skip == 'false'
        run: |
          sudo chroot /srv/chroot/ apt-get update
          sudo chroot /srv/chroot/ apt-get upgrade -y

      - name: Copy repo into chroot
        if: steps.updatecheck.outputs.skip == 'false'
        run: |
          sudo mkdir -p /srv/chroot/build
          sudo cp -a ./* /srv/chroot/build/

      - name: Build inside chroot
        if: steps.updatecheck.outputs.skip == 'false'
        run: |
          sudo chroot /srv/chroot/ bash -c "
            cd /build
            apt-get source xserver-xorg-core
            apt-get -y build-dep xserver-xorg-core
            chmod +x ./scripts/*.sh
            ./scripts/build-xorg-sunshine.sh
          "

      - name: Copy artifacts out of chroot
        if: steps.updatecheck.outputs.skip == 'false'
        run: |
          mkdir -p artifacts
          sudo cp /srv/chroot/build/artifacts/*.deb artifacts/

      - name: Upload built packages
        if: steps.updatecheck.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: xserver-xorg-sunshine
          path: artifacts/*.deb
          if-no-files-found: error

      - name: Create GitHub Release
        if: steps.updatecheck.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEBIAN_VERSION=$(curl -fsS https://packages.debian.org/stable/allpackages?format=txt.gz \
            | gunzip - \
            | perl -nE '/^xserver-xorg-core \((.+)\)/ && say $1')

          SAFE_VERSION=$(echo "$DEBIAN_VERSION" | sed 's/[:+]/_/g')

          DEB_FILE=$(ls artifacts/xserver-xorg-sunshine_*_amd64.deb | grep -v dbgsym)
          mv "$DEB_FILE" artifacts/xserver-xorg-sunshine_latest_amd64.deb

          TAG="xorg-$SAFE_VERSION"

          gh release create "$TAG" artifacts/xserver-xorg-sunshine_latest_amd64.deb \
            --clobber \
            --title "Sunshine Xorg $DEBIAN_VERSION" \
            --notes "Automated build of Sunshine-optimized Xorg for Debian stable."

          echo "Created release $TAG"
